version: '3.8'

services:
  # Go Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geofence-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - geofence-network

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geofence-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
      - NEXT_PUBLIC_WS_URL=ws://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - geofence-network

networks:
  geofence-network:
    driver: bridge
